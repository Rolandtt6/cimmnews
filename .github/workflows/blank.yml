name: Crypto Insider MM — News Bot

on:
  schedule:
    - cron: '0 * * * *'   # Every 1 hour
  workflow_dispatch:        # Manual trigger button

jobs:
  news-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser schedule

      - name: Cache sent news (restore)
        uses: actions/cache@v4
        with:
          path: sent_news.json
          key: sent-news-${{ github.run_number }}
          restore-keys: sent-news-

      - name: Run news bot (one-shot)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python crypto_news_bot.py --once

      - name: Save sent news (cache)
        uses: actions/cache@v4
        with:
          path: sent_news.json
          key: sent-news-${{ github.run_number }}
