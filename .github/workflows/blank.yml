name: Run Bot

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4

      - name: Run script
        run: python crypto_news_bot.py
